---
name: Manual Build & Push
on:
 workflow_dispatch:
jobs:
  build-push:
    uses: kbase/.github/.github/workflows/reusable_build-push.yml@main
    with:
      name: '${{ github.event.repository.name }}-develop'
      tags: br-${{ github.ref_name }}
      platforms: linux/amd64,linux/arm64/v8
    secrets: inherit
